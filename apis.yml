aid: loreal
name: L'Oréal
description: >-
  L'Oréal is the world's largest cosmetics and beauty company, producing
  skincare, makeup, haircare, and fragrance products. The group operates a
  portfolio of over 35 brands, including Lancôme, Maybelline, Garnier, NYX
  Professional Makeup, Kérastase, La Roche-Posay, and Kiehl's, sold in over
  150 countries. L'Oréal's primary developer surface is the ModiFace platform
  (a wholly owned subsidiary), which exposes an AR virtual try-on SDK and API
  for partner brands and retailers. L'Oréal Group itself does not operate a
  general-purpose corporate developer portal.
