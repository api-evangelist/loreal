apis:
  - aid: loreal:modiface-ar-virtual-try-on
    name: ModiFace AR Virtual Try-On SDK and API
    description: >-
      ModiFace, a L'Oréal company, provides an augmented reality virtual try-on
      platform for beauty brands and retailers. The platform offers a software
      development kit (SDK), embeddable miniprogram, and API endpoints for
      integrating product page virtual try-ons, standalone instant looks, and
      buildable makeup look experiences across web and mobile.
